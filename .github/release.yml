changelog:
  exclude:
    labels:
      - dependencies      # dependabot PRs (replaces the '^build(deps):' filter)
      - documentation     # replaces '^docs:'
      - test              # replaces '^test:'
      - ci                # replaces '^ci:'
      - chore             # replaces '^chore:'
    authors:
      - dependabot
      - dependabot[bot]
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Bug fixes
      labels:
        - bug
        - fix
    # Catch-all: any PR not excluded above and not matching a category lands here.
    - title: Others
      labels:
        - "*"
