# Runs the full CI suite on every pull request and on pushes to main.
#
# The jobs themselves live in the reusable ci.yml workflow so that the release
# pipeline can run the identical suite against a tagged commit.
name: Terraform Provider Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
